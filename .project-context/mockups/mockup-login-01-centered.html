<!--
  Mockup Login 01 — Minimal centered
  ===================================
  Klassisk, fokuserad login-vy: mörk bakgrund, centrerat kort, Byggbiten-logga,
  två fält, primär knapp. Efter login → hemvy med två stora val-cards
  ("Ny kalkyl" / "Återuppta kalkyl") plus lista över tidigare kalkyler.
  Klick på "Logga in" togglar vyn (ingen verifiering i mockup).
-->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login 01 — Minimal centered</title>
<style>
  :root {
    --brand-black: #1A1A1A;
    --brand-dark-gray: #3C3C3B;
    --brand-mid-gray: #7A7A79;
    --brand-light-gray: #C6C6C6;
    --surface-primary: #FFFFFF;
    --surface-secondary: #F7F6F3;
    --surface-soft: #F3F0E8;
    --border: #E5E3DC;
    --border-strong: #D3D1C8;
    --accent: #D88B2B;
    --accent-deep: #BA7517;
    --accent-soft: rgba(216,139,43,0.1);
    --text-on-dark: #F7F6F3;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Rubik', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px; line-height: 1.5;
    color: var(--brand-dark-gray);
    background: var(--surface-secondary);
    font-feature-settings: 'tnum' on;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ========== LOGIN VIEW ========== */
  .login-view {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 600px 400px at 75% 15%, rgba(216,139,43,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 500px 350px at 15% 85%, rgba(216,139,43,0.08) 0%, transparent 55%),
      linear-gradient(145deg, #252220 0%, #1A1A1A 45%, #141311 100%);
    display: grid; place-items: center; padding: 24px;
  }
  .login-card {
    background: rgba(247,246,243,0.04);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(247,246,243,0.12);
    border-radius: 18px;
    padding: 40px 36px 32px;
    width: 100%; max-width: 400px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(247,246,243,0.08);
    color: var(--text-on-dark);
    opacity: 0; transform: translateY(12px);
    animation: fadeUp 600ms var(--ease) 80ms forwards;
  }
  .login-logo {
    margin: 0 auto 24px; display: block;
    height: 46px; width: auto;
    animation: logoIn 900ms var(--spring) 150ms both;
  }
  .login-title {
    font-size: 22px; font-weight: 500;
    letter-spacing: -0.02em; text-align: center;
    margin-bottom: 6px;
    background: linear-gradient(180deg, var(--text-on-dark) 0%, #D4D2C8 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .login-subtitle {
    font-size: 13px; color: var(--brand-light-gray);
    text-align: center; margin-bottom: 30px;
  }
  .login-field { margin-bottom: 14px; }
  .login-label {
    display: block;
    font-size: 11px; font-weight: 500;
    color: var(--brand-light-gray);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .login-input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(247,246,243,0.05);
    border: 1px solid rgba(247,246,243,0.14);
    border-radius: 9px;
    color: var(--text-on-dark);
    font: inherit; font-size: 14px;
    outline: none;
    transition: all 180ms var(--ease);
  }
  .login-input:hover { background: rgba(247,246,243,0.07); }
  .login-input:focus {
    background: rgba(247,246,243,0.09);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(216,139,43,0.18);
  }
  .login-input::placeholder { color: rgba(247,246,243,0.4); }
  .login-btn {
    width: 100%; margin-top: 10px;
    padding: 13px 16px;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
    color: var(--text-on-dark);
    border: none; border-radius: 9px;
    font: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(216,139,43,0.3);
    transition: all 200ms var(--ease);
  }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(216,139,43,0.42); }
  .login-footer {
    text-align: center;
    font-size: 11px;
    color: var(--brand-light-gray);
    margin-top: 18px;
    letter-spacing: 0.02em;
  }

  /* ========== HOME VIEW ========== */
  .home-view {
    display: none;
    min-height: 100vh;
    background: var(--surface-secondary);
    background-image:
      radial-gradient(ellipse at 15% 8%, rgba(216,139,43,0.04) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 95%, rgba(26,26,26,0.03) 0%, transparent 55%);
  }
  .home-view.is-active { display: block; }
  .home-shell { max-width: 960px; margin: 0 auto; padding: 28px 24px 80px; }

  .home-header {
    background:
      radial-gradient(ellipse 480px 220px at 82% 10%, rgba(216,139,43,0.22) 0%, transparent 62%),
      linear-gradient(145deg, #272320 0%, #1C1A17 45%, #141311 100%);
    border-radius: 16px;
    padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
    color: var(--text-on-dark);
    margin-bottom: 24px;
    box-shadow: 0 6px 20px rgba(26,26,26,0.08), inset 0 1px 0 rgba(247,246,243,0.06);
  }
  .home-header-logo { height: 36px; width: auto; }
  .home-user {
    display: flex; align-items: center; gap: 14px;
    font-size: 13px;
  }
  .home-user-name { color: var(--text-on-dark); font-weight: 500; }
  .home-user-role { color: var(--brand-light-gray); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
  .logout-btn {
    background: transparent; color: var(--brand-light-gray);
    border: 1px solid rgba(247,246,243,0.18);
    padding: 7px 12px; border-radius: 7px;
    font: inherit; font-size: 12px; cursor: pointer;
    transition: all 180ms var(--ease);
    margin-left: 8px;
  }
  .logout-btn:hover { color: var(--text-on-dark); border-color: rgba(247,246,243,0.32); }

  .home-hero {
    margin-bottom: 28px;
    opacity: 0; animation: fadeUp 600ms var(--ease) 120ms forwards;
  }
  .home-hero-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
    color: var(--accent-deep); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .home-hero-title {
    font-size: 32px; font-weight: 500;
    color: var(--brand-black); letter-spacing: -0.03em;
    line-height: 1.15;
  }

  .home-actions {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 36px;
  }
  .action-card {
    background: var(--surface-primary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 26px;
    cursor: pointer; text-align: left;
    font: inherit; color: inherit;
    transition: all 240ms var(--ease);
    position: relative; overflow: hidden;
    opacity: 0; transform: translateY(12px);
    animation: fadeUp 600ms var(--ease) 200ms forwards;
  }
  .action-card:nth-child(2) { animation-delay: 260ms; }
  .action-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 20px 50px rgba(26,26,26,0.1);
  }
  .action-card::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent-soft) 0%, transparent 35%);
    opacity: 0; transition: opacity 280ms;
  }
  .action-card:hover::before { opacity: 1; }
  .action-card > * { position: relative; z-index: 1; }
  .action-icon {
    width: 44px; height: 44px;
    border-radius: 11px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    display: grid; place-items: center;
    margin-bottom: 14px;
    transition: all 240ms var(--ease);
  }
  .action-card.primary .action-icon {
    background: var(--brand-black); color: var(--accent);
  }
  .action-card:hover .action-icon {
    background: var(--accent); color: var(--text-on-dark);
    transform: rotate(-6deg);
  }
  .action-title {
    font-size: 18px; font-weight: 500;
    color: var(--brand-black); letter-spacing: -0.015em;
    margin-bottom: 4px;
  }
  .action-desc { font-size: 13px; color: var(--brand-mid-gray); line-height: 1.5; }
  .action-arrow {
    display: flex; align-items: center; gap: 6px;
    margin-top: 16px;
    font-size: 12px; color: var(--accent-deep);
    font-weight: 500;
  }

  .home-section-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--brand-mid-gray);
    margin-bottom: 14px;
  }
  .projects-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .project-row {
    background: var(--surface-primary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; cursor: pointer;
    transition: all 180ms var(--ease);
    font: inherit; color: inherit;
    text-align: left; width: 100%;
  }
  .project-row:hover {
    border-color: var(--border-strong);
    transform: translateX(2px);
  }
  .project-main { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .project-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: var(--surface-soft);
    color: var(--accent-deep);
    display: grid; place-items: center; flex-shrink: 0;
  }
  .project-info { min-width: 0; }
  .project-name {
    font-size: 14px; font-weight: 500;
    color: var(--brand-black);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .project-meta {
    font-size: 11px; color: var(--brand-mid-gray);
    letter-spacing: 0.04em;
  }
  .project-total {
    font-size: 15px; font-weight: 500;
    color: var(--brand-black);
    font-feature-settings: 'tnum' on;
    white-space: nowrap;
  }
  .project-total-meta {
    font-size: 10px; color: var(--brand-mid-gray);
    text-align: right; margin-top: 2px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes logoIn {
    0% { opacity: 0; transform: scale(0.85); }
    100% { opacity: 1; transform: scale(1); }
  }

  @media (max-width: 640px) {
    .home-actions { grid-template-columns: 1fr; }
    .home-hero-title { font-size: 26px; }
  }
</style>
</head>
<body>

<!-- LOGIN VIEW -->
<div class="login-view" id="loginView">
  <div class="login-card">
    <img class="login-logo" src="byggbiten-logga.svg" alt="Byggbiten i Norrland">
    <h1 class="login-title">Ytskiktskalkylator</h1>
    <p class="login-subtitle">Logga in för att komma åt din kalkylator.</p>
    <form onsubmit="event.preventDefault(); showHome()">
      <div class="login-field">
        <label class="login-label" for="user">Användarnamn</label>
        <input class="login-input" id="user" type="text" placeholder="hsbsundsvall" autocomplete="username">
      </div>
      <div class="login-field">
        <label class="login-label" for="pw">Lösenord</label>
        <input class="login-input" id="pw" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" type="submit">Logga in</button>
    </form>
    <p class="login-footer">Byggbiten i Norrland AB · Ytskiktskalkylator 1.0</p>
  </div>
</div>

<!-- HOME VIEW -->
<div class="home-view" id="homeView">
  <div class="home-shell">
    <div class="home-header">
      <img class="home-header-logo" src="byggbiten-logga.svg" alt="Byggbiten">
      <div class="home-user">
        <div>
          <div class="home-user-name">HSB Sundsvall</div>
          <div class="home-user-role">Förvaltare</div>
        </div>
        <button class="logout-btn" onclick="showLogin()">Logga ut</button>
      </div>
    </div>

    <div class="home-hero">
      <div class="home-hero-eyebrow">Välkommen tillbaka</div>
      <h2 class="home-hero-title">Vad vill du göra idag?</h2>
    </div>

    <div class="home-actions">
      <button class="action-card primary">
        <div class="action-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </div>
        <div class="action-title">Ny kalkyl</div>
        <div class="action-desc">Starta en tom kalkyl för en lägenhet från början.</div>
        <div class="action-arrow">Starta <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      </button>
      <button class="action-card">
        <div class="action-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
        </div>
        <div class="action-title">Återuppta kalkyl</div>
        <div class="action-desc">Fortsätt på en sparad kalkyl från listan nedan.</div>
        <div class="action-arrow">Öppna <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      </button>
    </div>

    <div class="home-section-title">Senast sparade kalkyler</div>
    <div class="projects-list">
      <button class="project-row">
        <div class="project-main">
          <div class="project-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
          </div>
          <div class="project-info">
            <div class="project-name">Brf Parken lgh 14</div>
            <div class="project-meta">Senast ändrad 18 april · 4 rum</div>
          </div>
        </div>
        <div>
          <div class="project-total">259 912 kr</div>
          <div class="project-total-meta">Ex. moms</div>
        </div>
      </button>
      <button class="project-row">
        <div class="project-main">
          <div class="project-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
          </div>
          <div class="project-info">
            <div class="project-name">Brf Mellby 8 lgh 2</div>
            <div class="project-meta">Senast ändrad 12 april · 3 rum</div>
          </div>
        </div>
        <div>
          <div class="project-total">182 400 kr</div>
          <div class="project-total-meta">Ex. moms</div>
        </div>
      </button>
      <button class="project-row">
        <div class="project-main">
          <div class="project-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
          </div>
          <div class="project-info">
            <div class="project-name">Brf Storgatan 45 lgh 7</div>
            <div class="project-meta">Senast ändrad 2 april · 5 rum</div>
          </div>
        </div>
        <div>
          <div class="project-total">342 150 kr</div>
          <div class="project-total-meta">Ex. moms</div>
        </div>
      </button>
    </div>
  </div>
</div>

<script>
  function showHome() {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('homeView').classList.add('is-active');
  }
  function showLogin() {
    document.getElementById('homeView').classList.remove('is-active');
    document.getElementById('loginView').style.display = 'grid';
  }
</script>

</body>
</html>
